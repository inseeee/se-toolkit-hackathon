<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFlow | Become Unstoppable</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(ellipse at top, #0a0f1e 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite;
            pointer-events: none;
        }
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.5); }
        }
        .motivation-left, .motivation-right {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 260px;
            padding: 28px 20px;
            background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(255,69,0,0.1) 100%);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.4);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .motivation-left { left: 30px; }
        .motivation-right { right: 30px; }
        .motivation-icon { font-size: 48px; margin-bottom: 16px; animation: iconPulse 2s infinite; }
        @keyframes iconPulse {
            0% { transform: scale(1); text-shadow: 0 0 0 gold; }
            50% { transform: scale(1.1); text-shadow: 0 0 20px gold; }
            100% { transform: scale(1); text-shadow: 0 0 0 gold; }
        }
        .motivation-text { font-size: 18px; font-weight: 700; color: #fff3c9; line-height: 1.4; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .container {
            max-width: 520px;
            width: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,215,0,0.2);
            padding: 28px 28px 32px;
            z-index: 2;
        }
        h1 { text-align: center; font-size: 38px; font-weight: 800; background: linear-gradient(135deg, #FFD700 0%, #FF8C00 50%, #FF4500 100%); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
        .habit-wrapper { text-align: center; margin-bottom: 20px; }
        .habit-name { display: inline-block; background: rgba(255,215,0,0.15); backdrop-filter: blur(8px); padding: 8px 24px; border-radius: 60px; font-size: 18px; font-weight: 700; color: #FFD700; border: 1px solid rgba(255,215,0,0.4); }
        .streak-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 32px; padding: 20px; text-align: center; margin-bottom: 20px; border: 1px solid rgba(255,215,0,0.3); }
        .streak-number { font-size: 64px; font-weight: 900; background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1; }
        .streak-label { font-size: 14px; color: #cbd5e1; margin-top: 8px; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%); color: #0f172a; font-weight: 800; font-size: 18px; border: none; border-radius: 60px; cursor: pointer; margin-bottom: 20px; transition: all 0.2s; }
        button:hover { transform: scale(1.02); box-shadow: 0 12px 28px rgba(255,215,0,0.5); }
        .message { background: rgba(255,215,0,0.1); border-left: 4px solid #FFD700; padding: 14px 18px; border-radius: 20px; margin-bottom: 20px; font-size: 14px; color: #FFD700; }
        canvas { max-height: 200px; margin-top: 8px; }
        .footer { text-align: center; margin-top: 20px; font-size: 11px; color: #475569; border-top: 1px solid #1e293b; padding-top: 16px; }
        @media (max-width: 1100px) { .motivation-left, .motivation-right { display: none; } }
    </style>
</head>
<body>
    <div id="stars"></div>
    <div class="motivation-left" id="motivationLeft">
        <div class="motivation-icon">⚡</div>
        <div class="motivation-text" id="motivationLeftText">Rise & Conquer</div>
    </div>
    <div class="motivation-right" id="motivationRight">
        <div class="motivation-icon">🔥</div>
        <div class="motivation-text" id="motivationRightText">Unstoppable Force</div>
    </div>
    <div class="container">
        <h1>🔥 HABITFLOW</h1>
        <div class="subtitle">BECOME UNSTOPPABLE</div>
        <div class="habit-wrapper"><div class="habit-name">⚔️ EXERCISE ⚔️</div></div>
        <div class="streak-card"><div class="streak-number" id="streak">0</div><div class="streak-label">DAY STREAK</div></div>
        <button id="markBtn"> MARK DONE — CONQUER TODAY</button>
        <div class="message" id="message">💪 Click the button to crush your habit!</div>
        <canvas id="historyChart"></canvas>
        <div class="footer">LAST 7 DAYS • THE STREAK IS YOUR LEGACY</div>
    </div>

    <script>
        const habit = "exercise";
        let chart;

        // Эпичные фразы — будут разными для левой и правой стороны
        const epicQuotesLeft = [
            " You are a warrior of discipline!",
            " Every rep, every day — you grow stronger.",
            " Champions are made in silence.",
            " Fear has no power here.",
            " One day closer to your best self.",
            " The universe rewards the relentless.",
            " Wake up. Train hard. Conquer.",
            " Small daily actions → epic results.",
            " Your future self thanks you.",
            " Stay hungry. Stay consistent.",
            " The streak is sacred. Protect it.",
            " You didn't come this far to stop now.",
            " Discipline > motivation.",
            " Summit by summit, you climb higher."
        ];

        const epicQuotesRight = [
            " Crush today. Repeat tomorrow.",
            " Zero excuses. Zero regrets.",
            " Your only limit is your mind.",
            " Greatness is built one day at a time.",
            " The pain of discipline > regret.",
            " Be the person you want to become.",
            " No one else will do it for you.",
            " Rise. Grind. Repeat.",
            " Stay locked in. Stay focused.",
            " You are stronger than your excuses.",
            " Burn the boats. No retreat.",
            " Every day is a battle. Win it.",
            " Momentum is your superpower.",
            " The view from the top is worth it."
        ];

        function getRandomQuote(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        async function fetchMotivation() {
            try {
                const res = await fetch("http://http://10.93.26.90:8000/motivation");
                const data = await res.json();
                return data.quote;
            } catch (error) {
                console.log("AI not available, using local quotes");
                return null;
            }
        }

        async function updateMotivation() {
            let leftQuote, rightQuote;
            const aiQuote = await fetchMotivation();
            
            if (aiQuote && aiQuote !== "🔥 Stay consistent! You've got this.") {
                // Если AI вернул нормальную фразу, используем её для обеих сторон
                leftQuote = ` "${aiQuote}"`;
                rightQuote = ` "${aiQuote}"`;
            } else {
                // Используем разные локальные фразы
                leftQuote = ` "${getRandomQuote(epicQuotesLeft)}"`;
                rightQuote = ` "${getRandomQuote(epicQuotesRight)}"`;
            }
            
            document.getElementById("motivationLeftText").innerHTML = leftQuote;
            document.getElementById("motivationRightText").innerHTML = rightQuote;
            
            // Взрывная анимация
            const leftEl = document.getElementById("motivationLeft");
            const rightEl = document.getElementById("motivationRight");
            leftEl.style.transform = "translateY(-50%) scale(1.02)";
            rightEl.style.transform = "translateY(-50%) scale(1.02)";
            setTimeout(() => {
                leftEl.style.transform = "translateY(-50%) scale(1)";
                rightEl.style.transform = "translateY(-50%) scale(1)";
            }, 300);
        }

        async function updateUI() {
            try {
                const streakRes = await fetch(`http://http://10.93.26.90:8000/streak?habit=${habit}`);
                const streak = await streakRes.json();
                document.getElementById("streak").innerText = streak.streak;
                const historyRes = await fetch(`http://http://10.93.26.90:8000/history?habit=${habit}`);
                const history = await historyRes.json();
                const labels = history.map(d => d.date.slice(5));
                const data = history.map(d => d.completed);
                if (chart) chart.destroy();
                const ctx = document.getElementById('historyChart').getContext('2d');
                chart = new Chart(ctx, {
                    type: 'bar',
                    data: { labels, datasets: [{ label: 'Completed', data, backgroundColor: '#FFD700', borderRadius: 10, barPercentage: 0.5 }] },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 1, ticks: { stepSize: 1, callback: (val) => val === 1 ? '✓' : '' } } } }
                });
            } catch (error) { console.error(error); }
        }

        document.getElementById("markBtn").onclick = async () => {
            const today = new Date().toISOString().slice(0,10);
            await fetch("http://http://10.93.26.90:8000/mark", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ habit, date: today }) });
            document.getElementById("message").innerHTML = "💥 EPIC! HABIT CRUSHED! 💥";
            setTimeout(() => { document.getElementById("message").innerHTML = "⚔️ ONE MORE DAY. ONE STEP CLOSER TO GREATNESS."; }, 2500);
            updateUI();
            updateMotivation();
        };

        // Звёзды
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = star.style.height = Math.random() * 3 + 1 + 'px';
            star.style.animationDelay = Math.random() * 5 + 's';
            document.getElementById('stars').appendChild(star);
        }

        updateUI();
        updateMotivation();
        setInterval(updateMotivation, 45000);
    </script>
</body>
</html>
