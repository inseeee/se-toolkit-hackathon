<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .habit-name {
            text-align: center;
            font-size: 24px;
            color: #667eea;
            margin-bottom: 20px;
        }
        .streak-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .streak-number {
            font-size: 48px;
            font-weight: bold;
            color: #764ba2;
        }
        .streak-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 20px;
        }
        button:hover {
            transform: scale(1.02);
        }
        .message {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-style: italic;
        }
        canvas {
            max-height: 300px;
            margin-top: 20px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> HabitFlow</h1>
        <div class="habit-name">Habit: Exercise </div>

        <div class="streak-card">
            <div class="streak-number" id="streak">0</div>
            <div class="streak-label">day streak</div>
        </div>

        <button id="markBtn"> Mark done for today</button>

        <div class="message" id="message">
             Click the button to mark your habit as done!
        </div>

        <canvas id="historyChart"></canvas>
        <div class="footer">Last 7 days • Keep building your habit!</div>
    </div>

    <script>
        const habit = "exercise";
        let chart;

        async function updateUI() {
            try {
                const streakRes = await fetch(`http://localhost:8000/streak?habit=${habit}`);
                const streak = await streakRes.json();
                document.getElementById("streak").innerText = streak.streak;

                const historyRes = await fetch(`http://localhost:8000/history?habit=${habit}`);
                const history = await historyRes.json();

                const labels = history.map(d => d.date.slice(5));
                const data = history.map(d => d.completed);

                if (chart) chart.destroy();
                const ctx = document.getElementById('historyChart').getContext('2d');
                chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Completed',
                            data: data,
                            backgroundColor: '#667eea',
                            borderRadius: 10
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 1,
                                ticks: { stepSize: 1 }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error(error);
            }
        }

        document.getElementById("markBtn").onclick = async () => {
            const today = new Date().toISOString().slice(0,10);
            await fetch("http://localhost:8000/mark", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ habit, date: today })
            });
            const msgDiv = document.getElementById("message");
            msgDiv.innerHTML = " Great job! You're building an unstoppable habit!";
            setTimeout(() => {
                msgDiv.innerHTML = " Keep going! One day at a time.";
            }, 3000);
            updateUI();
        };

        updateUI();
    </script>
</body>
</html>
