<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 850px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            padding: 35px;
            transition: transform 0.3s ease;
        }
        .container:hover {
            transform: translateY(-5px);
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .habit-name {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            background: #e2e8f0;
            display: inline-block;
            width: auto;
            margin: 0 auto 20px;
            padding: 8px 20px;
            border-radius: 40px;
            letter-spacing: 0.5px;
        }
        .habit-wrapper {
            text-align: center;
        }
        .streak-card {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .streak-number {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }
        .streak-label {
            font-size: 14px;
            color: #475569;
            margin-top: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        button:active {
            transform: scale(0.98);
        }
        .message {
            background: #ecfdf5;
            border-left: 4px solid #10b981;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            font-size: 14px;
            color: #065f46;
            font-weight: 500;
        }
        canvas {
            max-height: 280px;
            margin-top: 10px;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        @media (max-width: 640px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8rem; }
            .streak-number { font-size: 48px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> HabitFlow</h1>
        <div class="subtitle">one habit at a time</div>

        <div class="habit-wrapper">
            <div class="habit-name"> Exercise</div>
        </div>

        <div class="streak-card">
            <div class="streak-number" id="streak">0</div>
            <div class="streak-label">day streak</div>
        </div>

        <button id="markBtn"> Mark done for today</button>

        <div class="message" id="message">
             Click the button to mark your habit as done!
        </div>

        <canvas id="historyChart"></canvas>
        <div class="footer">Last 7 days • keep the streak alive</div>
    </div>

    <script>
        const habit = "exercise";
        let chart;

        async function updateUI() {
            try {
                const streakRes = await fetch(`http://localhost:8000/streak?habit=${habit}`);
                const streak = await streakRes.json();
                document.getElementById("streak").innerText = streak.streak;

                const historyRes = await fetch(`http://localhost:8000/history?habit=${habit}`);
                const history = await historyRes.json();

                const labels = history.map(d => d.date.slice(5));
                const data = history.map(d => d.completed);

                if (chart) chart.destroy();
                const ctx = document.getElementById('historyChart').getContext('2d');
                chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Completed',
                            data: data,
                            backgroundColor: '#3b82f6',
                            borderRadius: 8,
                            barPercentage: 0.65,
                            categoryPercentage: 0.8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: { position: 'top' },
                            tooltip: { callbacks: { label: (ctx) => ctx.raw === 1 ? '✓ Completed' : ' Not completed' } }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 1,
                                ticks: { stepSize: 1, callback: (val) => val === 1 ? '✓' : '✗' }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error(error);
            }
        }

        document.getElementById("markBtn").onclick = async () => {
            const today = new Date().toISOString().slice(0,10);
            await fetch("http://localhost:8000/mark", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ habit, date: today })
            });
            const msgDiv = document.getElementById("message");
            msgDiv.innerHTML = " Amazing! You're building an unstoppable habit!";
            setTimeout(() => {
                msgDiv.innerHTML = " Keep going! One day at a time.";
            }, 3000);
            updateUI();
        };

        updateUI();
    </script>
</body>
</html>
